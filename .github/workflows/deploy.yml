name: Deploy project to Tencent Server

on:
  push:
    branches:
      - main

# 配置工作流
jobs:
  deploy:
    # 设置运行环境
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # 上传构建产物
      - name: Upload artifact
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "public/**,src/**,package.json,package-lock.json,next.config.js,deploy.yml,deploy.sh"
          target: ${{ secrets.SERVER_TARGET_PATH }}
          rm: true
